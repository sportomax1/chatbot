<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini SPA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chat-height { height: calc(100vh - 160px); }
        body { background-color: #f9fafb; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid #e5e7eb; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <header class="glass sticky top-0 z-10 p-4 text-center">
        <h1 class="text-xl font-semibold text-gray-800">Gemini MVP</h1>
    </header>

    <main id="chat-window" class="flex-1 overflow-y-auto p-4 space-y-4 chat-height max-w-3xl mx-auto w-full">
        <div class="bg-white border border-gray-200 p-3 rounded-2xl rounded-tl-none shadow-sm max-w-[85%] text-gray-700">
            Hello! How can I help you today?
        </div>
    </main>

    <footer class="p-4 bg-white border-t border-gray-200">
        <form id="chat-form" class="max-w-3xl mx-auto flex gap-2">
            <input type="text" id="user-input" placeholder="Ask Gemini..." 
                class="flex-1 p-3 border border-gray-300 rounded-full focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
            <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-full font-medium hover:bg-blue-700 transition-colors">
                Send
            </button>
        </form>
    </footer>

    <script>
        const form = document.getElementById('chat-form');
        const input = document.getElementById('user-input');
        const chatWindow = document.getElementById('chat-window');

        function appendMessage(text, isUser = false) {
            const div = document.createElement('div');
            div.className = isUser 
                ? "bg-blue-600 text-white p-3 rounded-2xl rounded-tr-none shadow-sm max-w-[85%] ml-auto" 
                : "bg-white border border-gray-200 p-3 rounded-2xl rounded-tl-none shadow-sm max-w-[85%] text-gray-700";
            div.textContent = text;
            chatWindow.appendChild(div);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        form.onsubmit = async (e) => {
            e.preventDefault();
            const msg = input.value.trim();
            if (!msg) return;

            appendMessage(msg, true);
            input.value = '';

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg })
                });
                const data = await res.json();
                appendMessage(data.reply);
            } catch (err) {
                appendMessage("Error: Could not connect to the AI.");
            }
        };
    </script>
</body>
</html>
